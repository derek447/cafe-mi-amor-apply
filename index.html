<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Join the Cafe Mi Amor team — Hot Springs, AR</title>
<meta name="description" content="Cafe Mi Amor in Hot Springs is hiring — baristas, juice bar, and kitchen crew. Apply in two minutes.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sacramento&family=Karla:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2246%22 fill=%22%23D9B84A%22/></svg>">
<style>
  :root {
    --teal:#2A5F6D; --teal-deep:#204B57; --gold:#D9B84A; --gold-soft:#E3C963;
    --cream:#F7F0DD; --neon-red:#FF5C6E; --neon-yellow:#FFD84D; --ink:#1B3A43;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    min-height:100vh; font-family:'Karla',sans-serif; color:var(--cream);
    background: radial-gradient(circle at 50% 12%, rgba(255,255,255,0.05) 0%, rgba(0,0,0,0) 40%),
                linear-gradient(180deg, var(--teal) 0%, var(--teal-deep) 100%);
    display:flex; flex-direction:column; align-items:center;
    padding:0 18px 60px; position:relative; overflow-x:hidden;
  }
  .sun {
    width:min(420px, 86vw); aspect-ratio:1; border-radius:50%;
    margin-top:calc(min(420px,86vw) * -0.42);
    background:radial-gradient(circle at 42% 36%, #E8CF6E 0%, var(--gold) 62%, #C9A83B 100%);
    display:flex; align-items:flex-end; justify-content:center;
    padding-bottom:calc(min(420px,86vw) * 0.16); flex-shrink:0;
  }
  .sun img { width:72%; height:auto; transform:rotate(-4deg); }
  h1 { font-family:'Sacramento',cursive; font-weight:400; color:var(--gold-soft);
       font-size:clamp(56px, 13vw, 84px); line-height:1.05; margin:26px 0 4px; text-align:center; }
  .sub { font-size:15px; font-weight:600; letter-spacing:0.22em; text-indent:0.22em;
         text-transform:uppercase; text-align:center; margin-bottom:6px; }
  .neon { display:flex; gap:14px; justify-content:center; font-size:15px; font-weight:700;
          letter-spacing:0.14em; text-transform:uppercase; margin:10px 0 30px; flex-wrap:wrap; }
  .neon .red { color:var(--neon-red); text-shadow:0 0 10px rgba(255,92,110,0.6); }
  .neon .yellow { color:var(--neon-yellow); text-shadow:0 0 10px rgba(255,216,77,0.55); }
  .neon .dot { opacity:0.5; }
  form, .card {
    width:100%; max-width:520px; background:rgba(247,240,221,0.97); color:var(--ink);
    border-radius:14px; padding:28px 24px 30px; box-shadow:0 14px 44px rgba(0,0,0,0.3);
    position:relative; z-index:2;
  }
  label { display:block; font-size:13px; font-weight:700; letter-spacing:0.08em;
          text-transform:uppercase; margin:18px 0 6px; color:var(--teal-deep); }
  label:first-of-type { margin-top:0; }
  input[type=text], input[type=tel], input[type=email], select, textarea {
    width:100%; font:inherit; font-size:16px; color:var(--ink);
    background:#fff; border:1.5px solid #C9BFa4; border-radius:8px; padding:12px 12px;
  }
  input:focus, select:focus, textarea:focus { outline:3px solid rgba(217,184,74,0.55); border-color:var(--gold); }
  .checks { display:flex; flex-wrap:wrap; gap:10px; }
  .checks label {
    display:flex; align-items:center; gap:8px; margin:0; font-size:14px; font-weight:600;
    text-transform:none; letter-spacing:0; background:#fff; border:1.5px solid #C9BFa4;
    border-radius:999px; padding:9px 14px; cursor:pointer;
  }
  .checks input { accent-color:var(--teal); width:16px; height:16px; }
  .checks label:has(input:checked) { border-color:var(--teal); background:rgba(42,95,109,0.1); }
  button {
    width:100%; margin-top:26px; font:inherit; font-size:17px; font-weight:700;
    letter-spacing:0.14em; text-transform:uppercase; color:var(--teal-deep);
    background:linear-gradient(180deg, var(--gold-soft), var(--gold)); border:none;
    border-radius:999px; padding:16px; cursor:pointer; box-shadow:0 6px 18px rgba(0,0,0,0.2);
  }
  button:hover { filter:brightness(1.05); }
  .fine { font-size:13px; opacity:0.65; text-align:center; margin-top:14px; }
  .cta-script { font-family:'Sacramento',cursive; font-size:30px; color:var(--teal); }
  .leaf-field { position:absolute; inset:0; z-index:1; pointer-events:none; overflow:hidden; }
  svg.leaf { position:absolute; }
  .sun, h1, .sub, .neon { position:relative; z-index:2; }
  @media (max-width:700px) {
    .leaf-field { transform:scale(0.62); transform-origin:top center; width:161%; left:-30.5%; }
  }
  @media (prefers-reduced-motion: no-preference) {
    form, .card { animation: rise 0.5s ease-out; }
    @keyframes rise { from { transform: translateY(14px); opacity: 0; } to { transform:none; opacity:1; } }
  }
</style>
